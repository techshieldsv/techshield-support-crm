<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TechShield Support CRM</title>
    <meta name="description" content="Sistema web empresarial de tickets, CRM y portal de cliente para TechShield." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="#dashboard" data-route="dashboard">
        <img src="./assets/techshield-isotipo.png" alt="TechShield" />
        <span>
          <strong>TechShield</strong>
          <small>Soporte + CRM</small>
        </span>
      </a>

      <nav class="nav" aria-label="Navegacion principal">
        <a href="#dashboard" data-route="dashboard" class="active">Dashboard</a>
        <a href="#tickets" data-route="tickets">Tickets</a>
        <a href="#crm" data-route="crm">CRM</a>
        <a href="#portal" data-route="portal">Portal Cliente</a>
        <a href="#knowledge" data-route="knowledge">Base</a>
        <a href="#reports" data-route="reports">Reportes</a>
        <a href="#settings" data-route="settings">Ajustes</a>
        <a href="#login" data-route="login">Acceso</a>
      </nav>

      <div class="slogan">
        <span class="shield-dot"></span>
        <strong>Tecnologia confiable, resultados reales.</strong>
        <small>El Salvador</small>
      </div>
    </aside>

    <div class="shell">
      <header class="topbar">
        <a class="mobile-brand" href="#dashboard" data-route="dashboard">
          <img src="./assets/techshield-isotipo.png" alt="TechShield" />
          <strong>TechShield</strong>
        </a>
        <span class="contact">ventas.techshield@techshieldsv.com - WhatsApp +503 7428-0692</span>
        <button class="icon-button" id="themeToggle" type="button" aria-label="Cambiar tema">Tema</button>
      </header>

      <main id="app" class="content" tabindex="-1"></main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
